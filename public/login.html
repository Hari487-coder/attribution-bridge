<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sign in · Attribution Bridge</title>
<style>
  :root {
    --bg: #0f1420; --panel: #161d2e; --panel2: #1c2438; --line: #2a3550;
    --text: #e6ebf5; --dim: #8b96ad; --accent: #4f8cff; --bad: #f0556d;
  }
  * { box-sizing: border-box; }
  body { margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
    font: 14px/1.5 system-ui, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); padding: 24px; }
  .card { background: var(--panel); border: 1px solid var(--line); border-radius: 12px;
    padding: 28px 26px; width: 100%; max-width: 360px; }
  h1 { font-size: 18px; margin: 0 0 2px; }
  .sub { color: var(--dim); font-size: 12.5px; margin: 0 0 20px; }
  label { display: block; font-size: 12px; color: var(--dim); margin: 14px 0 4px; }
  input { width: 100%; background: var(--panel2); color: var(--text); border: 1px solid var(--line);
    border-radius: 6px; padding: 9px 11px; font-size: 14px; }
  input:focus { outline: 1px solid var(--accent); }
  button { width: 100%; margin-top: 20px; background: var(--accent); color: #fff; border: none;
    border-radius: 6px; padding: 10px 16px; font-size: 14px; cursor: pointer; }
  button:disabled { opacity: .55; cursor: default; }
  .err { color: var(--bad); font-size: 12.5px; margin-top: 14px; min-height: 16px; }
</style>
</head>
<body>
<form class="card" id="loginForm" autocomplete="on">
  <h1>Attribution Bridge</h1>
  <p class="sub">Sign in to manage your lead-distribution instance.</p>
  <label for="u">Username</label>
  <input id="u" name="username" autocomplete="username" autofocus>
  <label for="p">Password</label>
  <input id="p" name="password" type="password" autocomplete="current-password">
  <button type="submit" id="go">Sign in</button>
  <div class="err" id="err"></div>
</form>
<script>
  const $ = (id) => document.getElementById(id);
  $("loginForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    $("err").textContent = "";
    $("go").disabled = true;
    let r;
    try {
      const res = await fetch("/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username: $("u").value.trim(), password: $("p").value }),
      });
      r = await res.json();
    } catch {
      r = { ok: false, error: "Can't reach the server. Try again in a moment." };
    }
    if (r.ok) {
      window.location = "/";
    } else {
      $("err").textContent = r.error || "Sign in failed.";
      $("go").disabled = false;
      $("p").focus();
      $("p").select();
    }
  });
</script>
</body>
</html>
