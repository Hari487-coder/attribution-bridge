# Render Blueprint — one-click deploy for Attribution Bridge.
# Starter plan + persistent disk so your configuration and the opt-out
# registry survive restarts and deploys (the free tier's disk is wiped on
# every restart, which would lose your broker tokens and compliance records).
services:
  - type: web
    name: attribution-bridge
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /healthz
    envVars:
      - key: DATA_DIR
        value: /var/data
      - key: PORT
        value: "10000"
      # Super-admin login (the account picker). Set these at deploy time.
      # If left unset, a random password is generated and printed to the deploy
      # logs on first boot (search for "seeded super-admin").
      - key: SUPERADMIN_USER
        sync: false
      - key: SUPERADMIN_PASS
        sync: false
      # Platform hard-DNC list (comma-separated, any format) — numbers the dialer
      # never calls. Set this to match the platform's own list so the bridge never
      # creates a contact the dialer would refuse. The value is private, so it is
      # not shipped in the repo; set it here at deploy time.
      - key: PLATFORM_DNC
        sync: false
    disk:
      name: bridge-data
      mountPath: /var/data
      sizeGB: 1
